apiVersion: apps/v1
kind: Deployment
metadata:
  name: kms
  namespace: seto
  labels:
    app: kms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kms
  template:
    metadata:
      labels:
        app: kms
    spec:
      serviceAccountName: seto-kafka-sa
      containers:
        - name: kms
          image: 481961345072.dkr.ecr.ap-northeast-2.amazonaws.com/seto/backend-kms:latest
          ports:
            - containerPort: 8083
          env:
            # --- Timezone ---
            - name: TZ
              value: "Asia/Seoul"
            # --- Database (from Secrets Manager) ---
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: driver
            # --- JWT & AES (from Secrets Manager) ---
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret
            - name: AES_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: aes-secret-key
            # --- HikariCP ---
            - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              value: "5"
            - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
              value: "2"
            - name: SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT
              value: "10000"
            - name: SPRING_DATASOURCE_HIKARI_MAX_LIFETIME
              value: "30000"
            - name: SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT
              value: "30000"
            # --- Kafka MSK IAM ---
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "boot-4olzfnvs.c2.kafka-serverless.ap-northeast-2.amazonaws.com:9098"
            - name: SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL
              value: "SASL_SSL"
            - name: SPRING_KAFKA_PROPERTIES_SASL_MECHANISM
              value: "AWS_MSK_IAM"
            - name: SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG
              value: "software.amazon.msk.auth.iam.IAMLoginModule required;"
            - name: SPRING_KAFKA_PROPERTIES_SASL_CLIENT_CALLBACK_HANDLER_CLASS
              value: "software.amazon.msk.auth.iam.IAMClientCallbackHandler"
            # --- CORS ---
            - name: CORS_ALLOWED_ORIGINS
              value: "https://seto-be22-final.site,http://localhost:5173"
            # --- Feign (service-to-service) ---
            - name: FEIGN_ADMIN_URL
              value: "http://admin.seto.svc.cluster.local:8080"
            - name: FEIGN_HR_URL
              value: "http://hr.seto.svc.cluster.local:8081"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
