apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: seto-github-deploy
  annotations:
    seto.io/apply-mode: "manual-bootstrap"
    seto.io/description: "Apply this with an admin identity, not from the GitHub deploy workflow."
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - serviceaccounts
      - services
      - secrets
      - persistentvolumeclaims
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
      - statefulsets
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - ingressclasses
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["elbv2.k8s.aws"]
    resources:
      - ingressclassparams
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["eks.amazonaws.com"]
    resources:
      - ingressclassparams
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["external-secrets.io"]
    resources:
      - externalsecrets
      - clustersecretstores
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["monitoring.coreos.com"]
    resources:
      - servicemonitors
      - prometheusrules
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["elasticsearch.k8s.elastic.co"]
    resources:
      - elasticsearches
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["kibana.k8s.elastic.co"]
    resources:
      - kibanas
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: seto-github-deploy
subjects:
  - kind: Group
    name: seto-github-deploy
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: seto-github-deploy
  apiGroup: rbac.authorization.k8s.io
