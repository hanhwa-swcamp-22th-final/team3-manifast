apiVersion: v1
kind: ServiceAccount
metadata:
  name: seto-kafka-sa
  namespace: seto
  annotations:
    # Replace with the ARN of the IAM Role created for MSK IAM access
    eks.amazonaws.com/role-arn: "arn:aws:iam::481961345072:role/seto-msk-iam-role"
