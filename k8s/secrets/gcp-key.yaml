apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gcp-key
  namespace: seto
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: gcp-key
    creationPolicy: Owner
  data:
    - secretKey: gcp-key.json
      remoteRef:
        key: seto/gcp-key
