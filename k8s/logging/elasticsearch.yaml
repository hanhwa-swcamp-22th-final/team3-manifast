apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: seto-es
  namespace: seto
spec:
  version: 8.12.0
  nodeSets:
    - name: default
      count: 1
      config:
        node.store.allow_mmap: false
      podTemplate:
        spec:
          containers:
            - name: elasticsearch
              resources:
                requests:
                  memory: 1536Mi
                  cpu: 250m
                limits:
                  memory: 1536Mi
                  cpu: 1000m
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            storageClassName: ebs-auto-gp3
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
